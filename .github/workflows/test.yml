name: Test
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Validate OpenAPI spec
        run: |
          npm install --global swagger-spec-validator
          swagger-spec-validator openapi.yml
      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          args: --timeout=30m
  test-sqlite: # Run all tests against SQLite
    needs: analyze
    uses: SiaFoundation/workflows/.github/workflows/go-test.yml@22e56c0750c0febb09784caa01c60021e0b5f111 # master
    secrets: inherit

  test-mysql: # Run all tests against MySQL
    needs: analyze
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Configure MySQL
        uses: shogo82148/actions-setup-mysql@9c42ca180d5f1dd4dceb54c23c5eda0384f4d265 # v1.50.0
        with:
          distribution: "mysql"
          mysql-version: "9"
          root-password: test
      - name: Test
        uses: SiaFoundation/workflows/.github/actions/go-test@22e56c0750c0febb09784caa01c60021e0b5f111 # master
        env:
          RENTERD_DB_URI: 127.0.0.1:3306
          RENTERD_DB_USER: root
          RENTERD_DB_PASSWORD: test
        with:
          go-test-args: "-race;-timeout=20m;-tags=netgo"

  success: # Use in branch rulesets to ensure all matrix jobs completed successfully
    needs: [test-sqlite, test-mysql]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Success!"
